# Local Docker WebRTC config.
# Set LIVEKIT_NODE_IP in docker/.env to your LAN IPv4 when browsers cannot use loopback ICE
# (Firefox). Then open the web app at http://<that-ip>:5173.
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50060
  use_external_ip: false
  enable_loopback_candidate: true
  allow_tcp_fallback: true

turn:
  enabled: true
  domain: localhost
  udp_port: 3478
